name: Deploy site

on:
  push:

env:
  NODE_VERSION: 18.x
  NPM_CACHE_DIR: .cache/npm

jobs:
  build-site:
    runs-on: ubuntu-latest

    steps:
      - name: Clone repo
        uses: actions/checkout@v6

      - name: Set up node
        uses: actions/setup-node@v6
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Access npm cache
        uses: actions/cache@v4
        id: npm-cache
        with:
          path: ${{ env.NPM_CACHE_DIR }}
          key: ${{ runner.os }}-node-${{ hashFiles('**/package-lock.json') }}
          restore-keys: |
            ${{ runner.os }}-node-

      - name: Install dependencies
        run: |
          npm install --cache=${{ env.NPM_CACHE_DIR }}

      - name: Build site
        run: |
          npx antora --stacktrace antora-playbook.yml

      - name: Upload artifacts
        id: demo
        uses: actions/upload-pages-artifact@v3
        with:
          path: build/site

  deploy-site:
    runs-on: ubuntu-latest
    needs: build-site

    permissions:
      pages: write
      id-token: write

    environment:
      name: github-pages
      url: ${{ steps.demo.outputs.page_url }}

    steps:
      - name: Deploy to GitHub Pages
        id: demo
        uses: actions/deploy-pages@v4
